<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>m1sly Portfolio</title>
    <link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/2030229568465027072/uXgq6WK4_400x400.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* 📌 CURSOR AYARI: cursor.ani dosyasını GitHub'a yüklemeyi unutma! */
        body, a, button { cursor: url('cursor.ani'), auto !important; }

        :root{--bg:#030303;--text:#f0f0f0;--t2:#888;--t3:#444;--b1:rgba(255,255,255,.05);--b2:rgba(255,255,255,.09);--gl:rgba(255,255,255,.025);--gl2:rgba(255,255,255,.05)}
        *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;color:var(--text);overflow-x:hidden;background-image:url('arkaplan.jpg');background-size:cover;background-position:center;background-attachment:fixed;background-color:var(--bg)}
        .noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
        .orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:of 12s ease-in-out infinite}
        .o1{width:400px;height:400px;top:-100px;left:-100px;background:rgba(255,255,255,.015)}
        .o2{width:350px;height:350px;bottom:-100px;right:-100px;background:rgba(255,255,255,.01);animation-delay:4s}
        @keyframes of{0%,100%{transform:translate(0,0)}25%{transform:translate(30px,-20px)}50%{transform:translate(-20px,30px)}75%{transform:translate(20px,20px)}}
        .gl{background:var(--gl);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--b1);transition:.3s;position:relative;overflow:hidden}
        .gl:hover{background:var(--gl2);border-color:var(--b2)}
        .gl::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.03) 50%,transparent 60%);transform:translateX(-100%);pointer-events:none}
        .gl:hover::after{animation:sh .6s ease forwards}
        @keyframes sh{to{transform:translateX(100%)}}
        .bg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:-1}
        nav{position:fixed;top:0;width:100%;z-index:1000;padding:14px 0;transition:.4s}
        nav.s{background:rgba(3,3,3,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:8px 0}
        .ni{max-width:960px;margin:0 auto;padding:0 28px;display:flex;justify-content:space-between;align-items:center}
        .logo{display:flex;align-items:center;gap:9px;text-decoration:none}
        .logo-ic{width:24px;height:24px;border-radius:6px;overflow:hidden}.logo-ic img{width:100%;height:100%;object-fit:cover;border-radius:6px}
        .logo-tx{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);letter-spacing:-1px}.logo-tx span{opacity:.35}
        .nl{display:flex;list-style:none;gap:1px;align-items:center}
        .nl a{color:var(--t2);text-decoration:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;transition:.3s}.nl a:hover,.nl a.on{color:var(--text)}
        .cb{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-left:4px;transition:.3s}
        .cb.o{background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.07)}
        .cb.c{background:rgba(255,255,255,.02);color:var(--t3);border:1px solid rgba(255,255,255,.03)}
        .dot{width:4px;height:4px;border-radius:50%}.cb.o .dot{background:#fff;box-shadow:0 0 5px rgba(255,255,255,.4);animation:dp 2s infinite}.cb.c .dot{background:var(--t3)}
        @keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}
        .hm{display:none;flex-direction:column;gap:4px;cursor:pointer;z-index:1001;padding:4px}
        .hm span{width:17px;height:1.5px;background:var(--text);border-radius:2px;transition:.3s}
        .hm.on span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}.hm.on span:nth-child(2){opacity:0}.hm.on span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}
        .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:100px 28px 60px}
        .hc{text-align:center;max-width:560px;position:relative;z-index:1}
        .hav{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;overflow:hidden;border:1.5px solid var(--b2);position:relative;transition:.4s}
        .hav:hover{transform:scale(1.05)}.hav img{width:100%;height:100%;object-fit:cover}
        .hdot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);transition:.3s}
        .hdot.on{background:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}.hdot.off{background:var(--t3)}
        .hn{font-size:clamp(28px,5.5vw,48px);font-weight:800;letter-spacing:-1.5px;margin-bottom:4px;line-height:1.1;transition:font-family .4s}
        .hr{font-size:10px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
        .hcm{margin:12px auto;display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:16px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;transition:.3s}
        .hcm.o{background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.07)}
        .hcm.c{background:rgba(255,255,255,.02);color:var(--t3);border:1px solid rgba(255,255,255,.03)}
        .hcd{width:5px;height:5px;border-radius:50%}.hcm.o .hcd{background:#fff;box-shadow:0 0 6px rgba(255,255,255,.4);animation:dp 2s infinite}.hcm.c .hcd{background:var(--t3)}
        .hmt{display:flex;gap:14px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
        .hmi{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)}.hmi i{font-size:9px;opacity:.4}
        .hbi{font-size:12px;color:var(--t2);line-height:1.9;margin-bottom:24px;font-weight:300}
        .hlk{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
        .hl{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);text-decoration:none;transition:.3s;overflow:hidden}
        .hl:hover{color:var(--text);transform:translateY(-2px) scale(1.05)}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:11px;font-weight:500;text-decoration:none;transition:.3s;cursor:pointer;border:none;font-family:'Inter',sans-serif;position:relative;overflow:hidden}
        .bw{background:#fff;color:#000}.bw:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,255,255,.06)}
        .bo{background:transparent;color:var(--t2);border:1px solid var(--b1)}.bo:hover{color:var(--text);border-color:var(--b2);transform:translateY(-2px)}
        .sts{display:flex;gap:32px;justify-content:center;margin-top:44px;flex-wrap:wrap}
        .st{text-align:center;transition:.3s;cursor:default}.st:hover{transform:translateY(-2px)}
        .stv{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}.stl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
        .scl{position:absolute;bottom:28px;left:50%;width:1px;height:40px;overflow:hidden}
        .scl::after{content:'';position:absolute;top:-100%;left:0;width:100%;height:100%;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.2));animation:sd 1.8s ease-in-out infinite}
        @keyframes sd{0%{top:-100%}100%{top:100%}}
        section{padding:64px 28px;position:relative;z-index:1}
        .sh{text-align:center;margin-bottom:36px}
        .tgg{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:var(--t3);margin-bottom:7px;display:block}
        .tt{font-family:'Syne',sans-serif;font-size:clamp(18px,3vw,26px);font-weight:700;letter-spacing:-.8px;margin-bottom:6px}
        .td{color:var(--t3);font-size:11px;max-width:320px;margin:0 auto;line-height:1.8;font-weight:300}
        .dv{width:100%;height:1px;background:var(--b1);z-index:1;position:relative}
        .sg{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .sc{border-radius:10px;padding:20px 18px;cursor:default;transition:.3s}.sc:hover{transform:translateY(-3px)}
        .sc i.ic{font-size:12px;color:var(--t3);margin-bottom:10px;display:block;transition:.3s}.sc:hover i.ic{color:var(--text);transform:scale(1.1)}
        .sc h4{font-size:12px;font-weight:600;margin-bottom:5px}.sc p{font-size:10px;color:var(--t3);line-height:1.7;font-weight:300}
        .pg{max-width:960px;margin:0 auto;columns:2;column-gap:10px}
        .pc{break-inside:avoid;margin-bottom:10px;border-radius:10px;overflow:hidden;transition:.35s;cursor:pointer;display:inline-block;width:100%}
        .pc:hover{transform:translateY(-4px);border-color:var(--b2);box-shadow:0 16px 40px rgba(0,0,0,.4)}
        .pim{position:relative;overflow:hidden;background:#060606;min-height:100px}
        .pim img{width:100%;display:block;transition:.5s}.pc:hover .pim img{transform:scale(1.03)}
        .pov{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,3,3,.7),transparent 35%);opacity:0;transition:.3s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px}
        .pc:hover .pov{opacity:1}
        .pov span{font-size:9px;color:var(--t2);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);padding:4px 10px;border-radius:5px;display:flex;align-items:center;gap:4px}
        .fi{opacity:0;transform:translateY(16px);transition:.5s cubic-bezier(.16,1,.3,1)}.fi.v{opacity:1;transform:translateY(0)}
        @media(max-width:768px){.nl{display:none;position:fixed;inset:0;background:rgba(3,3,3,.97);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:8px}.nl.open{display:flex}.hm{display:flex}section{padding:44px 16px}.hero{padding:76px 16px 36px}.pg{columns:1}.sg{grid-template-columns:1fr}.ni{padding:0 16px}}
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="noise"></div>
    <nav id="nv"><div class="ni"><a href="#home" class="logo" id="lg"></a><div class="hm" id="hm" onclick="this.classList.toggle('on');document.getElementById('nl').classList.toggle('open')"><span></span><span></span><span></span></div>
    <ul class="nl" id="nl"><li><a href="#home">Home</a></li><li><a href="#services">Services</a></li><li><a href="#projects">Projects</a></li><li><a href="#contact">Contact</a></li></ul></div></nav>
    <section class="hero" id="home"><div class="hc fi">
        <h1 id="hn" style="font-size:48px;font-weight:800;">emsly</h1>
        <p>UI Designer</p>
    </div></section>
    <section id="projects"><div class="sh fi"><h2 class="tt">Recent Work</h2></div><div class="pg" id="pjg"></div></section>

    <script>
        const PROJECTS = [
            "https://pbs.twimg.com/media/G9kcokAXAAAqh4T?format=jpg&name=4096x4096",
            "https://pbs.twimg.com/media/HCzDImHW0AEWjAt?format=jpg&name=4096x4096"
        ];
        const pg = document.getElementById("pjg");
        pg.innerHTML = PROJECTS.map(img => `<div class="pc gl fi"><div class="pim"><img src="${img}" alt="UI"></div></div>`).join("");
        
        const obs = new IntersectionObserver(entries => {entries.forEach(e => {if(e.isIntersecting) e.target.classList.add("v")})}, {threshold: .1});
        document.querySelectorAll(".fi").forEach(el => obs.observe(el));
    </script>
</body>
</html>
