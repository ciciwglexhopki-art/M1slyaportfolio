<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>m1sly | UI Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Special+Elite&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --bg: #030303; --accent: #ff3e3e; }
        
        /* Custom Cursor - Gojo Satoru */
        body, a, button { cursor: url('cursor.ani'), auto !important; }
        
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif;
            background-image: url('arkaplan.jpg');
            background-size: cover; background-attachment: fixed; margin: 0;
        }
        
        .overlay { background: rgba(0,0,0,0.6); min-height: 100vh; padding: 50px 20px; }
        
        /* Akrilik / Buzlu Cam Efekti (Glassmorphism) */
        .container { 
            max-width: 800px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); /* Akrilik blur burada */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px; 
        }
        
        h1, h2 { font-family: 'Permanent Marker', cursive; text-transform: uppercase; }
        
        .projects { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .pc { 
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        
        /* Kalp Butonu */
        .like-btn { position: absolute; top: 15px; right: 15px; color: #fff; cursor: pointer; transition: 0.3s; }
        .like-btn:hover, .liked { color: var(--accent); }
        
        .socials { display: flex; gap: 20px; margin-top: 30px; font-size: 30px; }
        .socials a { color: #fff; transition: 0.3s; }
        .socials a:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="overlay">
    <div class="container">
        <h1 id="m1sly-title">m1sly | UI Designer</h1>
        
        <p><b>Role:</b> UI Designer | <b>Payment:</b> Robux | <b>Type:</b> Per Task</p>

        <div class="projects">
            <div class="pc">
                <i class="fas fa-heart like-btn" onclick="this.classList.toggle('liked')"></i>
                <h3>Montana Cans</h3>
            </div>
            <div class="pc">
                <i class="fas fa-heart like-btn" onclick="this.classList.toggle('liked')"></i>
                <h3>Project Visuals</h3>
            </div>
        </div>

        <h2>Services</h2>
        <ul>
            <li>All types of UI design for Roblox games</li>
            <li>Custom UI based on the game’s concept</li>
        </ul>

        <h2>Contact</h2>
        <div class="socials">
            <a href="https://discord.com/users/SENIN_ID_BURAYA" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://x.com/KULLANICI_ADIN" target="_blank"><i class="fab fa-x-twitter"></i></a>
        </div>
    </div>
</div>

<script>
    // Başlık Font Değiştirici
    const fonts = ['Permanent Marker', 'Bangers', 'Special Elite'];
    setInterval(() => {
        document.getElementById('m1sly-title').style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
    }, 2000);
</script>

</body>
</html>
