<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m1sly</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
  }

  /* Anime arka plan */
  .background {
    position: fixed;
    top: -20px;
    left: -20px;
    width: calc(100% + 40px);
    height: calc(100% + 40px);
    background-image: url('https://i.pinimg.com/originals/3e/0c/8e/3e0c8e8c8e8c8e8c8e8c8e8c8e8c8e8c.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(12px) brightness(0.5);
    z-index: -2;
  }

  /* Mor overlay */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(75, 0, 130, 0.6), rgba(0, 0, 0, 0.8), rgba(138, 43, 226, 0.4));
    z-index: -1;
  }

  /* Ana içerik */
  .container {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .title {
    font-size: 8rem;
    color: #fff;
    font-weight: 900;
    letter-spacing: 5px;
    text-shadow: 0 0 20px rgba(138, 43, 226, 0.8),
                 0 0 40px rgba(138, 43, 226, 0.5),
                 0 0 60px rgba(75, 0, 130, 0.3);
    animation: glow 3s ease-in-out infinite alternate;
  }

  .subtitle {
    font-size: 1.5rem;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 20px;
    letter-spacing: 8px;
    text-transform: uppercase;
  }

  .socials {
    margin-top: 40px;
    display: flex;
    gap: 20px;
  }

  .socials a {
    color: #fff;
    text-decoration: none;
    padding: 12px 30px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 30px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.05);
    transition: all 0.3s ease;
    font-size: 0.9rem;
    letter-spacing: 2px;
  }

  .socials a:hover {
    background: rgba(138, 43, 226, 0.3);
    border-color: #8a2be2;
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4);
  }

  @keyframes glow {
    from {
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.8),
                   0 0 40px rgba(138, 43, 226, 0.5);
    }
    to {
      text-shadow: 0 0 30px rgba(186, 85, 211, 1),
                   0 0 60px rgba(138, 43, 226, 0.8),
                   0 0 80px rgba(75, 0, 130, 0.5);
    }
  }

  @media (max-width: 768px) {
    .title { font-size: 4rem; }
    .subtitle { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
  <h1 class="title">m1sly</h1>
  <p class="subtitle">UI Designer</p>
  <div class="socials">
    <a href="#" target="_blank">Discord</a>
    <a href="#" target="_blank">Twitter</a>
    <a href="#" target="_blank">Portfolio</a>
  </div>
</div>

</body>
</html>
