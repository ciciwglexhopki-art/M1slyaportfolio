<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>M1SLY — Roblox UI Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono&family=Playfair+Display:wght@900&family=Bebas+Neue&family=Courier+Prime:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#141414;--bg4:#1a1a1a;
  --neon:#00ff88;--neon2:#00d4ff;--neonpk:#ff2d78;
  --tx:#f0f0f0;--tx2:#a0a0a0;--tx3:#505050;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --card:rgba(15,15,15,.95);
  --glow-g:0 0 40px rgba(0,255,136,.2);
}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
header{position:fixed;top:0;left:0;width:100%;padding:30px 60px;display:flex;justify-content:space-between;align-items:center;z-index:100;backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}

/* DİNAMİK LOGO */
.logo{font-size:1.8rem;font-weight:900;text-decoration:none;color:#fff;letter-spacing:-1px;transition:0.2s ease;}

.nav-links{display:flex;gap:40px}
.nav-links a{text-decoration:none;color:var(--tx2);font-size:0.9rem;font-weight:500;transition:0.3s;text-transform:uppercase;letter-spacing:1px}
.nav-links a:hover{color:#fff}

.container{max-width:1200px;margin:0 auto;padding:0 20px}
.hero{padding:200px 0 100px;text-align:center}
.hero h1{font-size:clamp(3rem, 10vw, 8rem);font-weight:900;letter-spacing:-4px;line-height:0.9;margin-bottom:20px;background:linear-gradient(to bottom, #fff 40%, #555);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.2rem;color:var(--tx2);max-width:600px;margin:0 auto 40px}

/* X (TWITTER) ALANI */
.work-grid{display:block; width:100%; margin-bottom:100px;}
.twitter-feed-wrapper {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 15px;
    overflow: hidden;
    box-shadow: var(--glow-g);
}

/* GİZLİ EDİT PANELİ (Sadece CTRL+L ile açılır) */
#ep{display:none;position:fixed;bottom:30px;right:30px;background:var(--bg3);padding:20px;border-radius:15px;border:1px solid var(--neon);z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,0.5)}

/* FORM STİLLERİ (Mevcut yapıyı koruduk) */
.contact-sec{padding:100px 0;border-top:1px solid var(--border)}
input,textarea,select{width:100%;padding:15px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:#fff;margin-bottom:20px;font-family:inherit}
button.submit-btn{background:var(--tx);color:var(--bg);padding:15px 40px;border:none;border-radius:30px;font-weight:800;cursor:pointer;transition:0.3s}
button.submit-btn:hover{transform:scale(1.05);background:var(--neon)}

@media(max-width:768px){
  header{padding:20px}
  .hero h1{font-size:4rem}
  .nav-links{display:none}
}
</style>
</head>
<body>

<header>
  <a href="#" class="logo" id="dynamicLogo">M1SLY</a>
  <div class="nav-links">
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>CREATIVE<br>INTERFACE</h1>
    <p>Roblox UI Designer specializing in high-end, modern, and immersive experiences.</p>
  </div>
</section>

<section class="container" id="work">
  <h2 style="margin-bottom:40px; font-size:2rem;">SELECTED PROJECTS</h2>
  <div class="twitter-feed-wrapper">
    <a class="twitter-timeline" data-height="800" data-theme="dark" href="https://twitter.com/stor4m?ref_src=twsrc%5Etfw">Loading tweets...</a> 
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  </div>
</section>

<section class="contact-sec" id="contact">
  <div class="container" style="max-width:600px">
    <h2 style="text-align:center; margin-bottom:40px">START A PROJECT</h2>
    <input type="text" id="f-name" placeholder="Discord Username or Name">
    <select id="f-type">
      <option value="Full Game UI">Full Game UI</option>
      <option value="Asset Pack">Asset Pack</option>
      <option value="Logo/Icon">Logo / Icon</option>
    </select>
    <textarea id="f-details" rows="5" placeholder="Project Details..."></textarea>
    <button class="submit-btn" onclick="sendEmail()" style="width:100%">SEND COMMISSION REQUEST</button>
  </div>
</section>

<div id="ep">
  <h4 style="color:var(--neon); margin-bottom:10px;">ADMIN PANEL</h4>
  <p style="font-size:12px; color:var(--tx2)">Sadece senin için aktif.</p>
  <button onclick="location.reload()" style="margin-top:10px; padding:5px; width:100%; cursor:pointer;">Sayfayı Yenile</button>
</div>

<script>
// 1. DİNAMİK LOGO FONT DEĞİŞTİRME
const fonts = ['Inter', 'Space Mono', 'Playfair Display', 'Bebas Neue', 'Courier Prime', 'Impact', 'Arial Black'];
let fontIndex = 0;
const logoEl = document.getElementById('dynamicLogo');

setInterval(() => {
  logoEl.style.fontFamily = fonts[fontIndex];
  fontIndex = (fontIndex + 1) % fonts.length;
}, 1000);

// 2. GİZLİ EDİTÖR PANELİ (CTRL + L)
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'l') {
    const panel = document.getElementById('ep');
    panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
  }
});

// 3. KOMİSYON MAİL FONKSİYONU
function sendEmail(){
  const name=document.getElementById('f-name').value;
  const type=document.getElementById('f-type').value;
  const details=document.getElementById('f-details').value;
  if(!name || !details){ alert('Lütfen gerekli alanları doldur.'); return; }
  
  const subject = encodeURIComponent('[Commission] ' + type);
  const body = encodeURIComponent('Name: ' + name + '\nDetails: ' + details);
  window.location.href = "mailto:iletisim@example.com?subject=" + subject + "&body=" + body;
}
</script>

</body>
</html>
